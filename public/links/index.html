<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"
    />
    <title>روابطنا - siymon</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        box-sizing: border-box;
        font-family: "Tajawal", sans-serif;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #0a0a14;
        color: white;
        overflow-x: hidden;
        touch-action: manipulation;
      }

      .glow-circle {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.3;
        animation: pulse-glow 4s ease-in-out infinite alternate;
        z-index: 0;
        pointer-events: none;
      }
      .glow-1 {
        width: 300px;
        height: 300px;
        background: #ff8c00;
        top: -10%;
        left: -10%;
      }
      .glow-2 {
        width: 250px;
        height: 250px;
        background: #ff4500;
        bottom: -10%;
        right: -10%;
        animation-delay: 2s;
      }
      @keyframes pulse-glow {
        0% {
          opacity: 0.2;
          transform: scale(1);
        }
        100% {
          opacity: 0.4;
          transform: scale(1.1);
        }
      }

      .container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        min-height: 100vh;
        max-width: 500px;
        margin: 0 auto;
        text-align: center;
      }

      .profile-img-container {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid rgba(255, 140, 0, 0.6);
        overflow: hidden;
        box-shadow: 0 0 30px rgba(255, 140, 0, 0.3);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ea580c, #7c2d12);
      }
      .profile-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .profile-placeholder svg {
        width: 48px;
        height: 48px;
        color: white;
      }

      h1 {
        font-size: 28px;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(to right, #fb923c, #fed7aa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p.subtitle {
        font-size: 16px;
        color: #9ca3af;
        margin-top: 8px;
        margin-bottom: 30px;
      }

      .links-wrapper {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .glass-btn {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 16px 24px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      .glass-btn:hover {
        background: rgba(255, 140, 0, 0.15);
        border-color: rgba(255, 140, 0, 0.5);
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
      }
      .glass-btn svg {
        width: 24px;
        height: 24px;
      }

      /* لوحة الإدارة */
      .admin-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(15px);
        z-index: 999999;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .admin-panel {
        background: #111827;
        border: 1px solid #ea580c;
        border-radius: 16px;
        padding: 30px;
        width: 100%;
        max-width: 400px;
        max-height: 85vh;
        overflow-y: auto;
        text-align: right;
        box-shadow: 0 0 40px rgba(234, 88, 12, 0.2);
      }
      .admin-panel h2 {
        color: #fb923c;
        text-align: center;
        margin-top: 0;
      }
      .admin-panel label {
        display: block;
        font-size: 14px;
        color: #9ca3af;
        margin-bottom: 5px;
        margin-top: 15px;
      }
      .admin-panel input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #374151;
        color: white;
        font-family: "Tajawal", sans-serif;
      }
      .admin-panel input:focus {
        outline: none;
        border-color: #f97316;
      }
      .admin-btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 15px;
        border: none;
        font-family: "Tajawal", sans-serif;
        font-size: 16px;
      }
      .btn-primary {
        background: #ea580c;
        color: white;
      }
      .btn-primary:hover {
        background: #c2410c;
      }
      .btn-secondary {
        background: transparent;
        border: 1px solid #374151;
        color: white;
      }
      .btn-secondary:hover {
        border-color: #f97316;
      }
    </style>
  </head>
  <body onload="alert('تم تحديث الصفحة بنجاح! النسخة رقم 10')">
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="container">
      <div class="profile-img-container" id="profileContainer">
        <img id="profileImg" src="" alt="Profile" style="display: none" />
        <div id="profilePlaceholder" class="profile-placeholder">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>

      <h1 id="titleEl">siymon</h1>
      <p id="subtitleEl" class="subtitle">مرحباً بكم في صفحة روابطنا</p>

      <div class="links-wrapper" id="linksContainer">
        <a
          id="link-instagram"
          href="https://instagram.com"
          target="_blank"
          class="glass-btn"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
          <span>انستجرام (Instagram)</span>
        </a>
      </div>

      <button
        onclick="testAdminClick()"
        style="
          position: relative;
          z-index: 9999999;
          margin-top: 50px;
          padding: 15px 30px;
          background-color: #ea580c;
          color: white;
          font-size: 18px;
          font-weight: bold;
          border-radius: 12px;
          border: none;
          cursor: pointer;
          box-shadow: 0 4px 15px rgba(234, 88, 12, 0.4);
        "
      >
        إعدادات الصفحة (اضغط 3 مرات)
      </button>
    </div>

    <div id="adminOverlay" class="admin-overlay">
      <div class="admin-panel">
        <div id="adminLogin">
          <h2>لوحة المشرف</h2>
          <input type="password" id="adminPass" placeholder="الرقم السري" />
          <button onclick="checkAdmin()" class="admin-btn btn-primary">
            دخول
          </button>
          <button onclick="closeAdmin()" class="admin-btn btn-secondary">
            إغلاق
          </button>
        </div>
        <div id="adminDashboard" style="display: none">
          <h2>إدارة الصفحة</h2>
          <label>صورة البروفايل</label>
          <input type="file" id="profileUpload" accept="image/*" />
          <label>الاسم</label>
          <input type="text" id="adminName" />
          <label>الموقع الإلكتروني</label>
          <input type="url" id="adminWeb" />
          <button
            onclick="saveAdmin()"
            id="saveBtn"
            class="admin-btn btn-primary"
          >
            حفظ التغييرات
          </button>
          <button onclick="closeAdmin()" class="admin-btn btn-secondary">
            إغلاق
          </button>
        </div>
      </div>
    </div>

    <script>
      // سكريبت الضغطات القاطع
      let clicks = 0;
      let timer;
      function testAdminClick() {
        clicks++;
        clearTimeout(timer);

        // هيطلعلك رسالة مع كل ضغطة عشان تتأكد إنه شغال
        alert("تم تسجيل الضغطة رقم: " + clicks);

        if (clicks >= 3) {
          clicks = 0;
          document.getElementById("adminOverlay").style.display = "flex";
        } else {
          timer = setTimeout(() => {
            clicks = 0;
          }, 2000);
        }
      }

      function closeAdmin() {
        document.getElementById("adminOverlay").style.display = "none";
        document.getElementById("adminLogin").style.display = "block";
        document.getElementById("adminDashboard").style.display = "none";
      }

      // جلب البيانات
      let serverData = {};
      async function loadData() {
        try {
          const res = await fetch("/api/social");
          if (res.ok) {
            serverData = await res.json();
            initPage();
          }
        } catch (e) {
          console.error(e);
        }
      }
      function initPage() {
        if (serverData.name)
          document.getElementById("titleEl").textContent = serverData.name;
      }
      loadData();
    </script>
  </body>
</html>
