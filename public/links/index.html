<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>روابطنا - siymon</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      /* الإعدادات الأساسية ومنع الزوم */
      * {
        box-sizing: border-box;
        font-family: "Tajawal", sans-serif;
      }
      body,
      html {
        margin: 0;
        padding: 0;
        min-height: 100vh;
        background-color: #0a0a14;
        color: white;
        overflow-x: hidden;
        touch-action: pan-y; /* يسمح بالاسكرول فقط ويمنع الزوم التلقائي في الموبايل */
      }

      /* خلفيات متحركة */
      .glow-circle {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        opacity: 0.3;
        animation: pulse-glow 4s ease-in-out infinite alternate;
        z-index: 1;
      }
      .glow-1 {
        width: 300px;
        height: 300px;
        background: #ff8c00;
        top: -10%;
        left: -10%;
      }
      .glow-2 {
        width: 250px;
        height: 250px;
        background: #ff4500;
        bottom: -10%;
        right: -10%;
        animation-delay: 2s;
      }
      @keyframes pulse-glow {
        0% {
          opacity: 0.2;
          transform: scale(1);
        }
        100% {
          opacity: 0.4;
          transform: scale(1.1);
        }
      }

      /* الحاوية الرئيسية */
      .container {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        min-height: 100vh;
        max-width: 500px;
        margin: 0 auto;
        text-align: center;
      }

      /* صورة البروفايل */
      .profile-img-container {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid rgba(255, 140, 0, 0.6);
        overflow: hidden;
        box-shadow: 0 0 30px rgba(255, 140, 0, 0.3);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ea580c, #7c2d12);
      }
      .profile-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .profile-placeholder svg {
        width: 48px;
        height: 48px;
        color: white;
      }

      /* النصوص */
      h1 {
        font-size: 28px;
        font-weight: 800;
        margin: 0;
        background: linear-gradient(to right, #fb923c, #fed7aa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      p.subtitle {
        font-size: 16px;
        color: #9ca3af;
        margin-top: 8px;
        margin-bottom: 30px;
      }

      /* أزرار الروابط */
      .links-wrapper {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .glass-btn {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 16px 24px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        color: white;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      .glass-btn:hover {
        background: rgba(255, 140, 0, 0.15);
        border-color: rgba(255, 140, 0, 0.5);
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(255, 140, 0, 0.2);
      }
      .glass-btn svg {
        width: 24px;
        height: 24px;
      }

      /* زرار تشغيل لوحة التحكم السري */
      .admin-trigger {
        margin-top: 50px;
        font-size: 14px;
        color: #4b5563;
        cursor: pointer;
        padding: 20px;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none; /* يمنع الزوم نهائياً عند لمس الكلمة دي في الموبايل */
      }

      /* لوحة الإدارة */
      .admin-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(10px);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .admin-overlay.active {
        display: flex;
      }
      .admin-panel {
        background: rgba(20, 20, 30, 0.95);
        border: 1px solid rgba(255, 140, 0, 0.3);
        border-radius: 16px;
        padding: 30px;
        width: 100%;
        max-width: 400px;
        max-height: 85vh;
        overflow-y: auto;
        text-align: right;
      }
      .admin-panel h2 {
        color: #fb923c;
        text-align: center;
        margin-top: 0;
      }
      .admin-panel label {
        display: block;
        font-size: 14px;
        color: #9ca3af;
        margin-bottom: 5px;
        margin-top: 15px;
      }
      .admin-panel input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #374151;
        color: white;
        font-family: "Tajawal", sans-serif;
      }
      .admin-panel input:focus {
        outline: none;
        border-color: #f97316;
      }
      .admin-btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 15px;
        border: none;
        font-family: "Tajawal", sans-serif;
        font-size: 16px;
      }
      .btn-primary {
        background: #ea580c;
        color: white;
      }
      .btn-primary:hover {
        background: #c2410c;
      }
      .btn-secondary {
        background: transparent;
        border: 1px solid #374151;
        color: white;
      }
      .btn-secondary:hover {
        border-color: #f97316;
      }
    </style>
  </head>
  <body>
    <div class="glow-circle glow-1"></div>
    <div class="glow-circle glow-2"></div>

    <div class="container">
      <div class="profile-img-container" id="profileContainer">
        <img id="profileImg" src="" alt="Profile" style="display: none" />
        <div id="profilePlaceholder" class="profile-placeholder">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
        </div>
      </div>

      <h1 id="titleEl">siymon</h1>
      <p id="subtitleEl" class="subtitle">مرحباً بكم في صفحة روابطنا</p>

      <div class="links-wrapper" id="linksContainer">
        <a
          id="link-instagram"
          href="https://instagram.com"
          target="_blank"
          class="glass-btn"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line>
          </svg>
          <span>انستجرام (Instagram)</span>
        </a>
        <a
          id="link-facebook"
          href="https://facebook.com"
          target="_blank"
          class="glass-btn"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"
            ></path>
          </svg>
          <span>فيسبوك (Facebook)</span>
        </a>
        <a
          id="link-tiktok"
          href="https://tiktok.com"
          target="_blank"
          class="glass-btn"
        >
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.88 2.89 2.89 0 0 1-2.88-2.88 2.89 2.89 0 0 1 2.88-2.88c.28 0 .56.04.82.1v-3.5a6.37 6.37 0 0 0-.82-.05A6.34 6.34 0 0 0 3.15 15.7 6.34 6.34 0 0 0 9.49 22a6.34 6.34 0 0 0 6.34-6.34V9.37a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1.01-.8z"
            />
          </svg>
          <span>تيك توك (TikTok)</span>
        </a>
        <a
          id="link-youtube"
          href="https://youtube.com"
          target="_blank"
          class="glass-btn"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.13C5.12 19.56 12 19.56 12 19.56s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z"
            ></path>
            <polygon
              points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02"
            ></polygon>
          </svg>
          <span>يوتيوب (YouTube)</span>
        </a>
        <a
          id="link-playstore"
          href="https://play.google.com"
          target="_blank"
          class="glass-btn"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <polygon points="3 22 21 12 3 2 3 22"></polygon>
          </svg>
          <span>متجر بلاي (Android)</span>
        </a>
        <a
          id="link-appstore"
          href="https://apps.apple.com"
          target="_blank"
          class="glass-btn"
        >
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
            />
          </svg>
          <span>آب ستور (iOS)</span>
        </a>
        <a
          id="link-website"
          href="https://siymon7.com"
          target="_blank"
          class="glass-btn"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="2" y1="12" x2="22" y2="12"></line>
            <path
              d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"
            ></path>
          </svg>
          <span>الموقع الإلكتروني</span>
        </a>
      </div>

      <p class="admin-trigger" id="adminTrigger" onclick="adminTap()">
        © siymon
      </p>
    </div>

    <div class="admin-overlay" id="adminOverlay">
      <div class="admin-panel">
        <div id="adminLogin">
          <h2>لوحة المشرف</h2>
          <input type="password" id="adminPass" placeholder="الرقم السري" />
          <button onclick="checkAdmin()" class="admin-btn btn-primary">
            دخول
          </button>
          <button onclick="closeAdmin()" class="admin-btn btn-secondary">
            إغلاق
          </button>
        </div>
        <div id="adminDashboard" style="display: none">
          <h2>إدارة الصفحة</h2>
          <label>صورة البروفايل</label>
          <input type="file" id="profileUpload" accept="image/*" />

          <label>الاسم</label>
          <input type="text" id="adminName" />
          <label>الوصف</label>
          <input type="text" id="adminDesc" />

          <label>Instagram</label>
          <input type="url" id="adminInsta" />
          <label>Facebook</label>
          <input type="url" id="adminFb" />
          <label>TikTok</label>
          <input type="url" id="adminTiktok" />
          <label>YouTube</label>
          <input type="url" id="adminYt" />
          <label>Google Play</label>
          <input type="url" id="adminPlay" />
          <label>App Store</label>
          <input type="url" id="adminApple" />
          <label>الموقع الإلكتروني</label>
          <input type="url" id="adminWeb" />

          <label>تغيير الرقم السري (اختياري)</label>
          <input type="password" id="adminNewPass" placeholder="رقم سري جديد" />

          <button
            onclick="saveAdmin()"
            id="saveBtn"
            class="admin-btn btn-primary"
          >
            حفظ التغييرات
          </button>
          <button onclick="closeAdmin()" class="admin-btn btn-secondary">
            إغلاق
          </button>
        </div>
      </div>
    </div>

    <script>
      let serverData = {};

      async function loadData() {
        try {
          const res = await fetch("/api/social");
          if (res.ok) {
            serverData = await res.json();
            initPage();
          }
        } catch (e) {
          console.error("السيرفر لم يستجب بعد:", e);
        }
      }

      function initPage() {
        if (serverData.name)
          document.getElementById("titleEl").textContent = serverData.name;
        if (serverData.desc)
          document.getElementById("subtitleEl").textContent = serverData.desc;

        const links = [
          "instagram",
          "facebook",
          "tiktok",
          "youtube",
          "playstore",
          "appstore",
          "website",
        ];
        links.forEach((id) => {
          const el = document.getElementById(`link-${id}`);
          if (serverData[id]) {
            el.href = serverData[id];
            el.style.display = "flex";
          } else if (serverData[id] === "") {
            el.style.display = "none";
          }
        });

        if (serverData.profileImg) {
          const img = document.getElementById("profileImg");
          img.src = serverData.profileImg;
          img.style.display = "block";
          document.getElementById("profilePlaceholder").style.display = "none";
        }
      }

      // تعديل الدالة لتعمل من ضغطة واحدة مباشرة للتيست وتخطي أي مشاكل
      function adminTap() {
        document.getElementById("adminOverlay").classList.add("active");
      }

      function checkAdmin() {
        const pass = document.getElementById("adminPass").value;
        if (!pass) return alert("أدخل الرقم السري");

        document.getElementById("adminLogin").style.display = "none";
        document.getElementById("adminDashboard").style.display = "block";

        document.getElementById("adminName").value =
          serverData.name || document.getElementById("titleEl").textContent;
        document.getElementById("adminDesc").value =
          serverData.desc || document.getElementById("subtitleEl").textContent;
        document.getElementById("adminInsta").value =
          serverData.instagram || "https://instagram.com";
        document.getElementById("adminFb").value =
          serverData.facebook || "https://facebook.com";
        document.getElementById("adminTiktok").value =
          serverData.tiktok || "https://tiktok.com";
        document.getElementById("adminYt").value =
          serverData.youtube || "https://youtube.com";
        document.getElementById("adminPlay").value =
          serverData.playstore || "https://play.google.com";
        document.getElementById("adminApple").value =
          serverData.appstore || "https://apps.apple.com";
        document.getElementById("adminWeb").value =
          serverData.website || "https://siymon7.com";
      }

      async function saveAdmin() {
        const btn = document.getElementById("saveBtn");
        btn.textContent = "جاري الحفظ...";
        btn.disabled = true;

        const payload = {
          adminPass: document.getElementById("adminPass").value,
          name: document.getElementById("adminName").value,
          desc: document.getElementById("adminDesc").value,
          instagram: document.getElementById("adminInsta").value,
          facebook: document.getElementById("adminFb").value,
          tiktok: document.getElementById("adminTiktok").value,
          youtube: document.getElementById("adminYt").value,
          playstore: document.getElementById("adminPlay").value,
          appstore: document.getElementById("adminApple").value,
          website: document.getElementById("adminWeb").value,
          profileImg: serverData.profileImg,
        };

        const newPass = document.getElementById("adminNewPass").value;
        if (newPass) payload.newPassword = newPass;

        try {
          const res = await fetch("/api/social", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          const result = await res.json();

          if (res.ok) {
            alert("تم الحفظ بنجاح!");
            loadData();
            closeAdmin();
          } else {
            alert(result.error || "فشل الحفظ");
          }
        } catch (e) {
          alert("حدث خطأ في الاتصال بالسيرفر");
        } finally {
          btn.textContent = "حفظ التغييرات";
          btn.disabled = false;
        }
      }

      function closeAdmin() {
        document.getElementById("adminOverlay").classList.remove("active");
        document.getElementById("adminLogin").style.display = "block";
        document.getElementById("adminDashboard").style.display = "none";
        document.getElementById("adminPass").value = "";
        document.getElementById("adminNewPass").value = "";
      }

      document
        .getElementById("profileUpload")
        .addEventListener("change", function (e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function (ev) {
            const img = new Image();
            img.onload = function () {
              const canvas = document.createElement("canvas");
              const MAX_WIDTH = 400;
              const scaleSize = MAX_WIDTH / img.width;
              canvas.width = MAX_WIDTH;
              canvas.height = img.height * scaleSize;
              const ctx = canvas.getContext("2d");
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              const dataUrl = canvas.toDataURL("image/jpeg", 0.7);

              serverData.profileImg = dataUrl;
              document.getElementById("profileImg").src = dataUrl;
              document.getElementById("profileImg").style.display = "block";
              document.getElementById("profilePlaceholder").style.display =
                "none";
            };
            img.src = ev.target.result;
          };
          reader.readAsDataURL(file);
        });

      loadData();
    </script>
  </body>
</html>
