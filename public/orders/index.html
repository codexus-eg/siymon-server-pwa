<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>siymon | الطلبات</title>

    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ff5722" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="siymon" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/orders/orders.css" />
    <link rel="stylesheet" href="/pw-toggle.css" />
  </head>

  <body>
    <header>
      <div class="wrap">
        <div class="topbar auth-topbar">
          <div class="brand">
            <img class="logo-img" src="/icons/icon-192.png" alt="siymon logo" />
            <div>
              <h1 id="brandTitle">siymon</h1>
              <p id="brandSub">طلباتك وحسابك</p>
            </div>
          </div>

          <div class="center-actions">
            <span class="pill" id="welcomePill">مرحباً بكم في siymon</span>
          </div>

          <div class="actions">
            <button class="btn ghost" id="langToggle" type="button">EN</button>
            <button
              class="btn ghost icon-btn"
              id="themeToggle"
              type="button"
              title="Theme"
              aria-label="Theme"
            ></button>
            <a class="btn" id="goHome" href="/">الرجوع</a>
          </div>
        </div>
      </div>
    </header>

    <main class="wrap">
      <section class="auth-shell">
        <div id="authView" class="auth-grid" style="display: none">
          <div class="hero">
            <h2 id="welcomeTitle">مرحباً بكم في siymon</h2>
            <p id="welcomeText">سجّل الدخول أو أنشئ حساباً لمتابعة طلباتك.</p>
            <div class="hero-actions">
              <button class="btn primary" id="tabLogin" type="button">
                تسجيل الدخول
              </button>
              <button class="btn ghost" id="tabSignup" type="button">
                إنشاء حساب
              </button>
              <button class="btn ghost" id="guestBtn" type="button">
                الدخول كزائر
              </button>
            </div>
            <div class="hint" id="authHint"></div>
          </div>

          <div class="panel auth-card">
            <form id="loginForm" class="form" autocomplete="on">
              <div class="field">
                <label id="loginIdLabel" for="loginId"
                  >البريد الإلكتروني أو رقم الهاتف</label
                >
                <input
                  id="loginId"
                  type="text"
                  inputmode="text"
                  placeholder="example@gmail.com أو 06..."
                  required
                />
              </div>

              <div class="field">
                <label id="loginPassLabel" for="loginPass">كلمة السر</label>
                <input
                  id="loginPass"
                  type="password"
                  placeholder="••••••"
                  required
                />
              </div>

              <button class="btn good" id="loginBtn" type="submit">دخول</button>
              <div class="hint" id="loginHint"></div>
            </form>

            <form
              id="signupForm"
              class="form"
              style="display: none"
              autocomplete="on"
            >
              <div class="two">
                <div class="field">
                  <label id="firstNameLabel" for="firstName">الاسم</label>
                  <input
                    id="firstName"
                    type="text"
                    placeholder="محمد"
                    required
                  />
                </div>
                <div class="field">
                  <label id="lastNameLabel" for="lastName">النسب</label>
                  <input
                    id="lastName"
                    type="text"
                    placeholder="العربي"
                    required
                  />
                </div>
              </div>

              <div class="field">
                <label id="emailLabel" for="email"
                  >البريد الإلكتروني (إجباري)</label
                >
                <input
                  id="email"
                  type="email"
                  placeholder="example@gmail.com"
                  required
                />
              </div>

              <div class="field">
                <label id="phoneLabel" for="phone">رقم الهاتف (اختياري)</label>
                <input
                  id="phone"
                  type="tel"
                  inputmode="tel"
                  placeholder="06/07xxxxxxxx"
                />
              </div>

              <div class="two">
                <div class="field">
                  <label id="passLabel" for="pass">كلمة السر</label>
                  <input
                    id="pass"
                    type="password"
                    placeholder="••••••"
                    required
                  />
                </div>
                <div class="field">
                  <label id="pass2Label" for="pass2">تأكيد كلمة السر</label>
                  <input
                    id="pass2"
                    type="password"
                    placeholder="••••••"
                    required
                  />
                </div>
              </div>

              <div
                class="field"
                id="policyField"
                style="grid-column: 1/-1; display: none"
              >
                <label class="checkbox">
                  <input id="acceptPolicy" type="checkbox" />
                  <span id="acceptPolicyText">أوافق على سياسة الشركة</span>
                </label>
                <div class="hint" style="margin-top: 6px">
                  <a id="readPolicyLink" href="/policy/">قراءة السياسة</a>
                </div>
              </div>

              <button class="btn primary" id="signupBtn" type="submit">
                إنشاء حساب
              </button>
              <div class="hint" id="signupHint"></div>
            </form>
          </div>
        </div>

        <div id="ordersView" class="panel" style="display: none">
          <div class="orders-top">
            <div>
              <h3 id="myOrdersTitle" style="margin: 0">طلباتي</h3>
              <p id="myOrdersSub" class="muted" style="margin: 4px 0 0">
                هنا ستجد جميع الطلبات الخاصة بك.
              </p>
            </div>
            <div class="orders-top-actions">
              <a class="btn" id="orderNow" href="/">اطلب الآن</a>
              <button class="btn ghost" id="soundToggle" type="button">
                🔔
              </button>
              <button class="btn" id="notificationsBtn" type="button">
                <span id="notificationsText">الإشعارات</span>
                <span
                  class="pill"
                  id="notificationsCountPill"
                  style="
                    display: none;
                    padding: 4px 10px;
                    font-size: 12px;
                    font-weight: 1000;
                    margin-inline-start: 8px;
                  "
                  >0</span
                >
              </button>
              <button class="btn" id="supportBtn" type="button">الدعم</button>
              <button class="btn bad" id="logoutBtn" type="button">
                تسجيل الخروج
              </button>
            </div>
          </div>

          <div class="profile" id="profileBox"></div>

          <div class="orders-actions">
            <button class="btn ghost" id="refreshOrders" type="button">
              تحديث
            </button>
            <div class="hint" id="ordersHint"></div>
          </div>

          <div id="ordersList" class="orders-list"></div>
        </div>
      </section>
    </main>

    <div class="modal" id="driverChatModal">
      <div class="modal-card" style="max-width: 920px">
        <div
          class="row"
          style="justify-content: space-between; align-items: center; gap: 10px"
        >
          <h3 id="driverChatTitle" style="margin: 0">Chat</h3>
          <button class="btn ghost" id="closeDriverChatBtn" type="button">
            ✕
          </button>
        </div>

        <div class="chat-box" id="driverChatBox" style="margin-top: 12px"></div>

        <div
          class="row"
          style="gap: 8px; margin-top: 10px; align-items: center"
        >
          <input
            id="driverChatInput"
            class="input"
            type="text"
            placeholder="اكتب رسالة..."
            style="flex: 1"
          />
          <button class="btn good" id="driverChatSendBtn" type="button">
            إرسال
          </button>
        </div>

        <div class="hint muted" id="driverChatHint"></div>
      </div>
    </div>

    <div class="modal" id="ratingModal" aria-hidden="true">
      <div class="modal-card">
        <div class="modal-head">
          <div>
            <div class="modal-title" id="ratingTitle">Rate your order</div>
            <div class="muted" id="ratingMeta"></div>
          </div>
          <button
            class="icon-btn"
            id="closeRatingBtn"
            type="button"
            aria-label="Close"
          >
            ✕
          </button>
        </div>
        <div class="modal-body">
          <div
            class="stars"
            id="starsRow"
            role="radiogroup"
            aria-label="Rating"
          >
            <button class="star-btn" type="button" data-star="1" aria-label="1">
              ★
            </button>
            <button class="star-btn" type="button" data-star="2" aria-label="2">
              ★
            </button>
            <button class="star-btn" type="button" data-star="3" aria-label="3">
              ★
            </button>
            <button class="star-btn" type="button" data-star="4" aria-label="4">
              ★
            </button>
            <button class="star-btn" type="button" data-star="5" aria-label="5">
              ★
            </button>
          </div>
          <textarea
            id="ratingComment"
            class="textarea"
            rows="4"
            placeholder="Write a short comment..."
          ></textarea>
          <div class="hint" id="ratingHint"></div>
        </div>
        <div class="modal-actions">
          <button class="btn" id="cancelRatingBtn" type="button">Cancel</button>
          <button class="btn good" id="submitRatingBtn" type="button">
            Submit
          </button>
        </div>
      </div>
    </div>
    <div class="modal" id="supportModal">
      <div class="modal-card">
        <div
          class="row"
          style="justify-content: space-between; align-items: center; gap: 10px"
        >
          <h3 id="supportTitle" style="margin: 0">الدعم</h3>
          <button class="btn ghost" id="closeSupportBtn" type="button">
            ✕
          </button>
        </div>
        <div
          class="chat-box"
          id="supportChatBox"
          style="margin-top: 12px"
        ></div>
        <div class="row" style="margin-top: 10px; gap: 8px">
          <input
            id="supportMsgInput"
            type="text"
            placeholder="اكتب رسالتك..."
            style="flex: 1"
          />
          <button class="btn primary" id="supportSendBtn" type="button">
            إرسال
          </button>
        </div>
        <div class="hint" id="supportHint"></div>
      </div>
    </div>

    <div class="modal" id="notificationsModal">
      <div class="modal-card" style="max-width: 820px">
        <div
          class="row"
          style="justify-content: space-between; align-items: center; gap: 10px"
        >
          <h3 id="notificationsTitle" style="margin: 0">الإشعارات</h3>
          <div class="row" style="gap: 8px; align-items: center">
            <button
              class="btn ghost"
              id="pushToggleBtn"
              type="button"
              style="display: none"
            >
              🔔
            </button>
            <button class="btn ghost" id="closeNotificationsBtn" type="button">
              ✕
            </button>
          </div>
        </div>
        <div class="hint muted" id="pushHint" style="margin-top: 6px"></div>
        <div
          id="notificationsList"
          class="notif-list"
          style="margin-top: 12px"
        ></div>
        <div class="hint muted" id="notificationsHint"></div>
      </div>
    </div>

    <footer>
      <div class="wrap">
        <span id="footerText">© siymon</span>
        <a
          id="policyLink"
          href="/policy/"
          style="margin-inline-start: 10px; display: none"
          >سياسة الشركة</a
        >
      </div>
    </footer>
    <script src="/pw-toggle.js"></script>
    <script src="/orders/orders.js"></script>
  </body>
</html>
